  #       - output.turn_off: led2_output

# =========== Reed Switches ==============
  - platform: gpio
    pin:
      number: GPIO34
    name: "Door Open"
    device_class: garage_door
  
  - platform: gpio
    pin:
      number: GPIO35
    name: "Door Closed"
    device_class: garage_door
# =========== Reed Switches ==============

# =========== Door Trigger ==============
switch:
  - platform: gpio
    pin: GPIO12
    id: relay
    restore_mode: ALWAYS_OFF

  - platform: template
    name: "Garage Door"
    icon: "mdi:garage"
    turn_on_action:
      - switch.turn_on: relay
      - delay: 500ms
      - switch.turn_off: relay

# =========== Door Trigger ==============

sensor:
# =========== Temp and Ambient Light ==============
  - platform: shtcx
    temperature:
      name: "Garage Temperature"
      filters:
      - calibrate_linear:
          method: least_squares
          datapoints: 
            # Calibration may be needed. Please see:
            # https://esphome.io/components/sensor/#calibrate-linear-filter
             - 39.28 -> 31.3
             - 36.32 -> 27.5
             - 27.4 -> 18.3
             - 24.3 -> 17.5
             - 25.66 -> 16.2
    humidity:
      name: "Garage Humidity"
    address: 0x70
    update_interval: 10s

  - platform: veml7700
    address: 0x10
    update_interval: 10s
    ambient_light: "Garage Ambient Light"
    actual_gain: 
      name: "Actual gain"
# =========== Temp and Ambient Light ==============

