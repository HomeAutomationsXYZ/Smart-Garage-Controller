# Configuration for the:
# Smart Garage Controller V1.0
#
# Template Configuration 
# 
# This is the default configuration that the devices 
# ship with. The user should update this based on
# the sensors that are added as well as the users
# own security info like API and OTA keys.
#
# Template V0.3

esphome:
  name: smgar
  friendly_name: Smart Garage

esp32:
  board: esp32dev
  flash_size: 8MB
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    # key: ""

ota:
  - platform: esphome
    # password: ""

wifi:
  # ssid: !secret wifi_ssid_2
  # password: !secret wifi_password_2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Smart Garage Controller"
    password: !secret initial_password

captive_portal:

web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password
    
uart:
  id: uart_bus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200
  data_bits: 8 
  parity: NONE
  stop_bits: 1
  
output:
  - platform: gpio
    pin: GPIO14
    id: led1_output
  - platform: gpio
    pin: GPIO32
    id: led2_output


# I2C Bus Interface
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_a

globals:
  - id: led_state
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(led_state);'
          then:
            - output.turn_off: led1_output
            - lambda: 'id(led_state) = false;'
          else:
            - output.turn_on: led1_output
            - lambda: 'id(led_state) = true;'


