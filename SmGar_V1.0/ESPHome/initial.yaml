button:
  # Added to Software Reset the WiFi Credentials
  # Can be removed by user.
  - platform: factory_reset
    name: "Reset Device (WiFi Setup Mode)"
    entity_category: config

interval:
  - interval: 5s
    then:
      - if:
          condition:
            not:
              - wifi.connected:   
          then:
            - output.turn_on: led2_output
            - delay: 500ms
            - output.turn_off: led2_output
          else:
            - output.turn_off: led2_output
